<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strong Password Generator – Daily Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  :root {
    --bg: #0f172a;
    --bg-soft: #111827;
    --panel: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.14);
    --text: #e5e7eb;
    --muted: #cbd5e1;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --success: #22c55e;
    --radius: 20px;
    --shadow: 0 10px 30px rgba(0,0,0,0.25);
    --max-width: 500px;
  }

  * {box-sizing: border-box; margin:0; padding:0;}
  body {
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 30%),
                radial-gradient(circle at top right, rgba(34,197,94,0.10), transparent 25%),
                linear-gradient(135deg, #0f172a, #111827 45%, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: var(--text);
  }

  .container {
    background: var(--panel);
    border:1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 30px;
    max-width: var(--max-width);
    width: 100%;
    text-align: center;
  }

  h1 {
    font-size: 2em;
    margin-bottom: 25px;
    color: var(--primary);
    font-weight: 700;
  }

  .input-group, .checkbox-group {
    text-align: left;
    margin-bottom: 20px;
  }

  .input-group label, .checkbox-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: var(--text);
  }

  .input-group input[type="number"] {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background-color: var(--bg-soft);
    color: var(--text);
    font-size: 1em;
    outline: none;
  }

  .checkbox-group input[type="checkbox"] {
    margin-right: 10px;
    transform: scale(1.2);
  }

  .password-display {
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    font-size: 1.2em;
    font-family: 'Courier New', monospace;
    color: var(--primary);
    min-height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.2);
    margin-top: 25px;
    word-break: break-all;
  }

  button {
    background-color: var(--primary);
    color: #fff;
    border: none;
    padding: 12px 25px;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 600;
    font-size: 1em;
    transition: background 0.3s ease, transform 0.2s ease;
    margin-top: 15px;
    width: 100%;
    max-width: 250px;
  }

  button:hover {
    background-color: var(--primary-hover);
    transform: translateY(-2px);
  }

  .copy-button {
    background-color: var(--muted);
    color: var(--bg-soft);
    box-shadow: 0 4px 10px rgba(203, 213, 225, 0.3);
  }

  .copy-button:hover {
    background-color: #9ca3af;
    color: var(--bg-soft);
  }

  .note {
    margin-top: 20px;
    font-size: 0.9em;
    color: var(--muted);
  }

  @media (max-width: 480px) {
    .container {
      padding: 30px 20px;
    }
    h1 {
      font-size: 1.7em;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <h1>🔒 Strong Password Generator</h1>
    <div class="input-group">
      <label for="passwordLength">Password Length:</label>
      <input type="number" id="passwordLength" value="12" min="6" max="64">
    </div>

    <div class="checkbox-group">
      <label><input type="checkbox" id="includeUppercase" checked> Include Uppercase (A-Z)</label>
      <label><input type="checkbox" id="includeLowercase" checked> Include Lowercase (a-z)</label>
      <label><input type="checkbox" id="includeNumbers" checked> Include Numbers (0-9)</label>
      <label><input type="checkbox" id="includeSymbols"> Include Symbols (!@#$%^&*)</label>
    </div>

    <button onclick="generatePassword()">Generate Password</button>
    <button class="copy-button" onclick="copyPassword()">Copy Password</button>

    <div class="password-display" id="generatedPassword">
      Click 'Generate Password'
    </div>

    <p class="note"><em>Note: JavaScript is essential for actual password generation.</em></p>
  </div>

  <script>
    function generatePassword() {
      const length = parseInt(document.getElementById('passwordLength').value);
      const includeUppercase = document.getElementById('includeUppercase').checked;
      const includeLowercase = document.getElementById('includeLowercase').checked;
      const includeNumbers = document.getElementById('includeNumbers').checked;
      const includeSymbols = document.getElementById('includeSymbols').checked;

      let characters = "";
      if (includeUppercase) characters += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (includeLowercase) characters += "abcdefghijklmnopqrstuvwxyz";
      if (includeNumbers) characters += "0123456789";
      if (includeSymbols) characters += "!@#$%^&*()_+[]{}|;:,.<>?";

      if (characters.length === 0) {
        document.getElementById('generatedPassword').innerText = "Select at least one character type.";
        return;
      }

      let password = "";
      for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * characters.length);
        password += characters[randomIndex];
      }

      document.getElementById('generatedPassword').innerText = password;
    }

    function copyPassword() {
      const passwordField = document.getElementById('generatedPassword');
      const password = passwordField.innerText;

      if (password === "Click 'Generate Password'" || password === "Select at least one character type.") {
        alert("No password to copy!");
        return;
      }

      navigator.clipboard.writeText(password).then(() => {
        alert("Password copied to clipboard!");
      }).catch(err => {
        alert("Failed to copy password. Please copy it manually.");
      });
    }

    document.addEventListener('DOMContentLoaded', generatePassword);
  </script>
</body>
</html>
