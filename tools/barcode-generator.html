<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Generator – Daily Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root {
  --bg: #0f172a;
  --bg-soft: #111827;
  --panel: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.14);
  --text: #e5e7eb;
  --muted: #cbd5e1;
  --primary: #3b82f6;
  --primary-hover: #2563eb;
  --success: #22c55e;
  --radius: 20px;
  --shadow: 0 10px 30px rgba(0,0,0,0.25);
  --max-width: 500px;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 30%),
              radial-gradient(circle at top right, rgba(34,197,94,0.10), transparent 25%),
              linear-gradient(135deg, #0f172a, #111827 45%, #1e293b);
  color: var(--text);
  padding: 20px;
}

.container {
  background: var(--panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 40px 30px;
  max-width: var(--max-width);
  width: 100%;
  text-align: center;
}

h1 {
  font-size: 2em;
  margin-bottom: 25px;
  color: var(--primary);
  font-weight: 700;
}

.input-group {
  margin-bottom: 20px;
  text-align: left;
}

.input-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: var(--text);
}

.input-group input[type="text"],
.input-group select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background-color: var(--bg-soft);
  color: var(--text);
  font-size: 1em;
  outline: none;
}

.input-group input[type="text"]::placeholder {
  color: var(--muted);
}

.input-group input[type="text"]:focus,
.input-group select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
}

button {
  background-color: var(--primary);
  color: #fff;
  border: none;
  padding: 12px 25px;
  border-radius: 999px;
  cursor: pointer;
  font-weight: 600;
  font-size: 1em;
  transition: background 0.3s ease, transform 0.2s ease;
  margin-top: 15px;
  width: 100%;
  max-width: 250px;
}

button:hover {
  background-color: var(--primary-hover);
  transform: translateY(-2px);
}

.barcode-output-section {
  margin-top: 30px;
  padding-top: 25px;
  border-top: 1px solid var(--border);
  text-align: center;
}

.barcode-output-section h2 {
  color: var(--success);
  margin-bottom: 20px;
  font-size: 1.8em;
  font-weight: 700;
}

#barcodeDisplay {
  width: 100%;
  max-width: 350px;
  margin: 0 auto;
  display: block;
  border: 1px solid var(--border);
  border-radius: 10px;
  background-color: var(--bg-soft);
  padding: 10px;
}

#barcodeDisplay svg {
  display: block;
  width: 100%;
  height: auto;
}

.error-message {
  color: #f87171;
  margin-top: 15px;
  font-size: 0.9em;
  font-weight: 500;
  display: none;
}

@media (max-width: 480px) {
  .container {
    padding: 30px 20px;
  }
  h1 {
    font-size: 1.7em;
  }
  button {
    max-width: 100%;
    padding: 12px 20px;
  }
  .barcode-output-section h2 {
    font-size: 1.5em;
  }
}
</style>
</head>
<body>
<div class="container">
  <h1>📦 Barcode Generator</h1>
  <div class="input-group">
    <label for="barcodeData">Enter data for barcode:</label>
    <input type="text" id="barcodeData" placeholder="e.g., ProductID123 or URL">
  </div>
  <div class="input-group">
    <label for="barcodeType">Select barcode type:</label>
    <select id="barcodeType">
      <option value="CODE128">CODE128 (General)</option>
      <option value="EAN13">EAN13 (Europe)</option>
      <option value="UPC">UPC (Universal)</option>
      <option value="CODE39">CODE39 (Alpha-numeric)</option>
      <option value="ITF14">ITF14 (Shipping)</option>
    </select>
  </div>
  <button id="generateBarcodeBtn">Generate Barcode</button>

  <div class="barcode-output-section">
    <h2>Your Barcode</h2>
    <div id="barcodeDisplay">
      <svg id="barcode"></svg>
    </div>
    <p id="errorMessage" class="error-message"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const barcodeDataInput = document.getElementById('barcodeData');
  const barcodeTypeSelect = document.getElementById('barcodeType');
  const generateBarcodeBtn = document.getElementById('generateBarcodeBtn');
  const barcodeSVG = document.getElementById('barcode');
  const errorMessage = document.getElementById('errorMessage');

  generateBarcodeBtn.addEventListener('click', generateBarcode);

  function generateBarcode() {
    const data = barcodeDataInput.value.trim();
    const type = barcodeTypeSelect.value;

    errorMessage.style.display = 'none';
    barcodeSVG.innerHTML = '';

    if (!data) {
      errorMessage.textContent = 'Please enter data to generate a barcode.';
      errorMessage.style.display = 'block';
      return;
    }

    try {
      JsBarcode(barcodeSVG, data, {
        format: type,
        displayValue: true,
        lineColor: "#fff",
        width: 2,
        height: 100,
        textMargin: 5,
        font: "Poppins",
        fontSize: 16,
        background: "transparent"
      });
    } catch (error) {
      errorMessage.textContent = `Error generating barcode: ${error.message}`;
      errorMessage.style.display = 'block';
      console.error(error);
    }
  }

  barcodeDataInput.value = 'HelloWorld'; // default text
  generateBarcode();
});
</script>
</body>
</html>
