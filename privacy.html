<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy – Daily Toolkit</title>

  <meta name="description" content="Daily Toolkit Privacy Policy — how we collect, use, and protect your information. GDPR compliant, AdSense ready.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://dailytoolkit.xyz/privacy.html">
  <meta property="og:title" content="Privacy Policy – Daily Toolkit">
  <meta property="og:description" content="Read our full privacy policy covering data collection, cookies, Google AdSense, and your rights.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dailytoolkit.xyz/privacy.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6737111642010842" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #0A0A0A;
      --white:      #FFFFFF;
      --gray-100:   #F7F7F7;
      --gray-200:   #EFEFEF;
      --gray-400:   #ABABAB;
      --gray-600:   #6B6B6B;
      --gold:       #C9A84C;
      --gold-light: #E8D28A;
      --gold-dim:   rgba(201,168,76,0.10);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Inter', system-ui, sans-serif;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --t: 0.3s;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--black);
      line-height: 1.6;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--gray-100); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    /* ── SCROLL PROGRESS ── */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      width: 0%; z-index: 2000; transition: width 0.1s linear;
    }

    /* ── BACK TO TOP ── */
    #back-to-top {
      position: fixed; bottom: 1.8rem; right: 1.8rem; z-index: 900;
      width: 42px; height: 42px;
      background: var(--black); color: var(--white);
      border: none; border-radius: 2px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; opacity: 0; pointer-events: none;
      transition: opacity var(--t), background var(--t), transform var(--t);
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    #back-to-top.visible { opacity: 1; pointer-events: auto; }
    #back-to-top:hover { background: var(--gold); color: var(--black); transform: translateY(-2px); }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4%; height: 68px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--gray-200);
      transition: box-shadow var(--t) var(--ease);
      gap: 1rem;
    }
    nav.scrolled { box-shadow: 0 2px 24px rgba(0,0,0,0.07); }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
      color: var(--black); white-space: nowrap;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .nav-logo span { color: var(--gold); }
    .nav-logo i { color: var(--gold); font-size: 1.1rem; }

    .nav-links { display: flex; gap: 1.6rem; list-style: none; align-items: center; }
    .nav-links a {
      font-size: 0.82rem; font-weight: 500; color: var(--gray-600);
      letter-spacing: 0.04em; text-transform: uppercase;
      transition: color var(--t); padding: 4px 0; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px; background: var(--gold);
      transform: scaleX(0); transform-origin: left; transition: transform var(--t);
    }
    .nav-links a:hover, .nav-links a.active { color: var(--black); }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px; background: none; border: none;
    }
    .hamburger span { display: block; width: 22px; height: 1.5px; background: var(--black); transition: var(--t); }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    .mobile-menu {
      display: none; position: fixed; top: 68px; left: 0; right: 0;
      background: var(--white); border-bottom: 1px solid var(--gray-200);
      padding: 1.2rem 4%; flex-direction: column; gap: 0.2rem; z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 0.88rem; font-weight: 500; color: var(--gray-600);
      letter-spacing: 0.04em; text-transform: uppercase;
      transition: color var(--t); padding: 0.6rem 0;
      border-bottom: 1px solid var(--gray-200);
    }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: var(--gold); }

    /* ── PAGE HERO ── */
    .page-hero {
      margin-top: 68px; padding: 80px 4% 60px;
      background: var(--gray-100);
      border-bottom: 1px solid var(--gray-200);
      position: relative; overflow: hidden;
    }
    .page-hero-bg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-display);
      font-size: clamp(60px, 12vw, 180px);
      font-weight: 700; color: transparent;
      -webkit-text-stroke: 1px var(--gray-200);
      user-select: none; pointer-events: none;
      white-space: nowrap; opacity: 0.7;
    }
    .page-hero-inner { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 0.6rem;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1rem;
    }
    .page-eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: var(--gold); }

    .page-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4.5vw, 3.4rem);
      font-weight: 700; line-height: 1.1;
      letter-spacing: -0.03em; color: var(--black); margin-bottom: 1rem;
    }
    .page-hero h1 em { font-style: italic; color: var(--gold); }
    .page-hero p { font-size: 0.98rem; color: var(--gray-600); line-height: 1.8; max-width: 560px; }

    /* Last updated badge */
    .updated-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      margin-top: 1.4rem;
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: 2px; padding: 0.45rem 0.9rem;
      font-size: 0.76rem; color: var(--gray-600); letter-spacing: 0.04em;
    }
    .updated-badge i { color: var(--gold); }

    .breadcrumb {
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 1.4rem; font-size: 0.76rem; color: var(--gray-400); letter-spacing: 0.04em;
    }
    .breadcrumb a { color: var(--gray-400); transition: color var(--t); }
    .breadcrumb a:hover { color: var(--gold); }
    .breadcrumb i { font-size: 0.6rem; }

    /* ── GOLD DIVIDER ── */
    .gold-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* ── TRUST STRIP ── */
    .trust-strip {
      background: var(--black); padding: 1rem 4%;
    }
    .trust-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; justify-content: center; align-items: center;
      gap: 2.5rem; flex-wrap: wrap;
    }
    .trust-item {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.76rem; color: rgba(255,255,255,0.55);
      letter-spacing: 0.04em;
    }
    .trust-item i { color: var(--gold); font-size: 0.85rem; }

    /* ── LAYOUT ── */
    .privacy-layout {
      max-width: 1200px; margin: 0 auto; width: 100%;
      padding: 72px 4%;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 3.5rem;
      align-items: start;
    }

    /* ── SIDEBAR TOC ── */
    .toc-sidebar {
      position: sticky; top: 88px;
    }
    .toc-box {
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 4px; padding: 1.6rem;
    }
    .toc-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 1rem; padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--gray-200);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .toc-list { list-style: none; display: flex; flex-direction: column; gap: 0.15rem; }
    .toc-list li a {
      font-size: 0.8rem; color: var(--gray-600);
      padding: 0.38rem 0.6rem; display: block;
      border-radius: 2px; transition: background var(--t), color var(--t);
      border-left: 2px solid transparent;
    }
    .toc-list li a:hover { background: var(--white); color: var(--black); border-left-color: var(--gold); }
    .toc-list li a.toc-active { background: var(--white); color: var(--black); border-left-color: var(--gold); font-weight: 600; }

    .toc-contact-box {
      margin-top: 1.2rem;
      background: var(--black); border-radius: 4px; padding: 1.4rem;
      position: relative; overflow: hidden;
    }
    .toc-contact-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
    }
    .toc-contact-box p { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 0.9rem; line-height: 1.6; }
    .toc-contact-box a {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--gold); color: var(--black);
      padding: 0.55rem 1rem; font-size: 0.76rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase; border-radius: 2px;
      transition: background var(--t);
    }
    .toc-contact-box a:hover { background: var(--gold-light); }

    /* ── MAIN CONTENT ── */
    .privacy-content { min-width: 0; }

    /* Highlight box */
    .highlight-box {
      background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.25);
      border-left: 3px solid var(--gold); border-radius: 0 4px 4px 0;
      padding: 1.2rem 1.4rem; margin-bottom: 2.5rem;
      display: flex; gap: 0.9rem; align-items: flex-start;
    }
    .highlight-box i { color: var(--gold); font-size: 1rem; margin-top: 2px; flex-shrink: 0; }
    .highlight-box p { font-size: 0.85rem; color: var(--gray-600); line-height: 1.75; }
    .highlight-box strong { color: var(--black); }

    /* Section */
    .p-section {
      margin-bottom: 3rem; scroll-margin-top: 88px;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }
    .p-section.visible { opacity: 1; transform: translateY(0); }

    .p-section-header {
      display: flex; align-items: center; gap: 0.9rem;
      margin-bottom: 1.2rem; padding-bottom: 0.9rem;
      border-bottom: 1px solid var(--gray-200);
    }
    .p-section-num {
      width: 36px; height: 36px; border-radius: 4px;
      background: var(--black); color: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 0.9rem; font-weight: 700;
      flex-shrink: 0;
    }
    .p-section h2 {
      font-family: var(--font-display);
      font-size: 1.25rem; font-weight: 700; color: var(--black);
      letter-spacing: -0.01em;
    }

    .p-section p {
      font-size: 0.9rem; color: var(--gray-600); line-height: 1.85;
      margin-bottom: 0.9rem;
    }
    .p-section p:last-child { margin-bottom: 0; }

    /* Info list */
    .p-list { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; margin: 0.9rem 0; }
    .p-list li {
      display: flex; gap: 0.7rem; align-items: flex-start;
      font-size: 0.88rem; color: var(--gray-600); line-height: 1.7;
    }
    .p-list li i { color: var(--gold); font-size: 0.75rem; margin-top: 4px; flex-shrink: 0; }
    .p-list li strong { color: var(--black); }

    /* Info card row */
    .info-cards {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.9rem; margin: 1.2rem 0;
    }
    .info-card {
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 4px; padding: 1.2rem;
      transition: border-color var(--t);
    }
    .info-card:hover { border-color: var(--gold); }
    .info-card .ic-icon { font-size: 1.1rem; color: var(--gold); margin-bottom: 0.5rem; }
    .info-card h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.3rem; }
    .info-card p { font-size: 0.8rem; color: var(--gray-600); line-height: 1.6; margin: 0; }

    /* Warning box */
    .warn-box {
      background: #fff8ee; border: 1px solid #f5d78e;
      border-left: 3px solid #e6a817; border-radius: 0 4px 4px 0;
      padding: 1rem 1.3rem; margin: 1rem 0;
      display: flex; gap: 0.8rem; align-items: flex-start;
    }
    .warn-box i { color: #e6a817; margin-top: 2px; flex-shrink: 0; }
    .warn-box p { font-size: 0.84rem; color: #7a5a10; line-height: 1.7; margin: 0; }

    /* Rights grid */
    .rights-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin: 1.2rem 0;
    }
    .right-item {
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 4px; padding: 1.1rem;
      transition: transform var(--t), border-color var(--t);
    }
    .right-item:hover { transform: translateY(-2px); border-color: var(--gold); }
    .right-item i { color: var(--gold); font-size: 1rem; margin-bottom: 0.5rem; display: block; }
    .right-item h4 { font-size: 0.82rem; font-weight: 700; margin-bottom: 0.25rem; }
    .right-item p { font-size: 0.76rem; color: var(--gray-600); line-height: 1.55; margin: 0; }

    /* Cookie table */
    .cookie-table { width: 100%; border-collapse: collapse; margin: 1.2rem 0; font-size: 0.83rem; }
    .cookie-table thead tr { background: var(--black); }
    .cookie-table thead th {
      padding: 0.75rem 1rem; text-align: left;
      color: rgba(255,255,255,0.7); font-size: 0.72rem;
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .cookie-table thead th:first-child { color: var(--gold); }
    .cookie-table tbody tr { border-bottom: 1px solid var(--gray-200); }
    .cookie-table tbody tr:hover { background: var(--gray-100); }
    .cookie-table td { padding: 0.75rem 1rem; color: var(--gray-600); line-height: 1.5; vertical-align: top; }
    .cookie-table td:first-child { font-weight: 600; color: var(--black); }
    .badge {
      display: inline-block; padding: 0.18rem 0.55rem;
      border-radius: 2px; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .badge-req { background: #fee2e2; color: #991b1b; }
    .badge-ana { background: #dbeafe; color: #1e40af; }
    .badge-ads { background: #fef3c7; color: #92400e; }
    .badge-pref { background: #d1fae5; color: #065f46; }

    /* Contact section */
    .contact-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 1.2rem 0;
    }
    .contact-card {
      background: var(--gray-100); border: 1px solid var(--gray-200);
      border-radius: 4px; padding: 1.4rem;
      display: flex; flex-direction: column; gap: 0.5rem;
      transition: border-color var(--t);
    }
    .contact-card:hover { border-color: var(--gold); }
    .contact-card i { color: var(--gold); font-size: 1.1rem; }
    .contact-card h4 { font-size: 0.88rem; font-weight: 700; }
    .contact-card a { font-size: 0.84rem; color: var(--gold); transition: color var(--t); }
    .contact-card a:hover { color: var(--black); text-decoration: underline; }
    .contact-card p { font-size: 0.8rem; color: var(--gray-600); margin: 0; }

    /* Updates log */
    .update-log { display: flex; flex-direction: column; gap: 0; margin: 1rem 0; }
    .update-item {
      display: flex; gap: 1.2rem; align-items: flex-start;
      padding: 0.9rem 0; border-bottom: 1px solid var(--gray-200);
    }
    .update-item:last-child { border-bottom: none; }
    .update-date {
      font-size: 0.72rem; font-weight: 700; color: var(--gold);
      letter-spacing: 0.06em; text-transform: uppercase;
      min-width: 80px; flex-shrink: 0; padding-top: 2px;
    }
    .update-item p { font-size: 0.84rem; color: var(--gray-600); line-height: 1.65; margin: 0; }
    .update-item strong { color: var(--black); }

    /* External link */
    .ext-link {
      color: var(--gold); transition: color var(--t);
      text-decoration: underline; text-decoration-color: transparent;
      transition: text-decoration-color var(--t);
    }
    .ext-link:hover { color: var(--black); text-decoration-color: var(--black); }

    /* ── FOOTER ── */
    footer {
      background: var(--black); color: rgba(255,255,255,0.45);
      padding: 2.6rem 4%; margin-top: auto;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-logo { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; color: var(--white); }
    .footer-logo span { color: var(--gold); }
    .footer-links { display: flex; gap: 1.6rem; list-style: none; flex-wrap: wrap; }
    .footer-links a {
      font-size: 0.76rem; color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em; text-transform: uppercase; transition: color var(--t);
    }
    .footer-links a:hover { color: var(--gold); }
    .footer-copy {
      font-size: 0.74rem; color: rgba(255,255,255,0.22);
      width: 100%; text-align: center;
      padding-top: 1.4rem; border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 0.6rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 960px) {
      .privacy-layout { grid-template-columns: 1fr; }
      .toc-sidebar { position: static; }
      .toc-box { display: none; }
      .toc-contact-box { margin-top: 0; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }
    @media (max-width: 640px) {
      .info-cards { grid-template-columns: 1fr; }
      .rights-grid { grid-template-columns: repeat(2, 1fr); }
      .contact-grid { grid-template-columns: 1fr; }
      .trust-inner { gap: 1.2rem; justify-content: flex-start; }
      .privacy-layout { padding: 48px 4%; }
      .page-hero { padding: 60px 4% 44px; }
      .cookie-table { font-size: 0.76rem; }
      .cookie-table td, .cookie-table th { padding: 0.55rem 0.6rem; }
    }
    @media (max-width: 400px) {
      .rights-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="progress-bar"></div>
  <button id="back-to-top" aria-label="Back to top"><i class="fa-solid fa-arrow-up"></i></button>

  <!-- ── NAVBAR ── -->
  <nav id="navbar"
